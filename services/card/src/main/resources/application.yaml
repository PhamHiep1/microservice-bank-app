api:
  prefix: "/api"
server:

  port: 9000
spring:
  application:
    name: card
  profiles:
    active: prod
  datasource:
    url: jdbc:h2:mem:carddb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  config:
    import: "configserver:http://localhost:8071"